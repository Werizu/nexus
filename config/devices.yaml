# NEXUS Device Registry
# All devices registered here are auto-discovered by their plugins

devices:
  computers:
    - id: main_pc
      name: "Desktop PC"
      plugin: pc_control
      room: office
      mac_address: "2C:F0:5D:99:03:63"
      ip: 192.168.178.43
      ssh_user: marlon
      ssh_key: "~/.pi-manager/keys/id_rsa"
      vnc_port: 5900
      os: windows
      check_port: 3389

  pis:
