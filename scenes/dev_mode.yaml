name: dev_mode
display_name: "Programmier-Modus"
icon: code
color: "#00D4FF"

triggers:
  - type: alexa_phrase
    phrases:
      - "Programmier-Modus"
      - "wir programmieren was"
  - type: api
    endpoint: /scenes/dev_mode

conditions:
  - time_between: ["07:00", "02:00"]

actions:
  # 1. PC-Steckdose einschalten (Monitor, Peripherie)
  - action: plug.on
    device: plug_pc

  # 3. Warten bis Netzteil Standby-Strom liefert
  - action: wait
    seconds: 10

  # 4. Wake-on-LAN → warten bis Agent meldet "online"
  - action: pc.wake
    device: main_pc
    wait_until_online: true
    timeout: 90

  # 5. Warten bis RDP bereit ist
  - action: wait
    seconds: 15

  # 6. Mac: Windows App öffnen (Verbindung manuell klicken)
  - action: mac.rdp_connect

  # 7. Mac: NEXUS Dashboard im Browser öffnen
  - action: mac.open_url
    url: "http://100.122.236.58"
