name: dev_mode
display_name: "Programmier-Modus"
icon: code
color: "#00D4FF"

triggers:
  - type: alexa_phrase
    phrases:
      - "Programmier-Modus"
      - "wir programmieren was"
  - type: api
    endpoint: /scenes/dev_mode

conditions:
  - time_between: ["07:00", "02:00"]

actions:
  # 1. Lichter auf Focus-Mode (kühles Weißlicht, 70%)
  - action: light.focus
    device: light_1
  - action: light.focus
    device: light_2
  - action: light.focus
    device: light_3
  - action: light.focus
    device: light_4

  # 2. PC-Steckdose einschalten (Monitor, Peripherie)
  - action: plug.on
    device: plug_pc

  # 3. Kurz warten, dann PC aufwecken
  - action: wait
    seconds: 2

  # 4. Wake-on-LAN → warten bis Agent meldet "online"
  - action: pc.wake
    device: main_pc
    wait_until_online: true
    timeout: 90

  # 5. IDE und Terminals starten
  - action: pc.launch
    device: main_pc
    program: "code"
    args: []

  - action: wait
    seconds: 3

  # 6. Windows Terminal öffnen
  - action: pc.launch
    device: main_pc
    program: "wt"
    args: []
